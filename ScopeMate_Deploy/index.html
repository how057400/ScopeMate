<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScopeMate</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="panel" aria-live="polite">
      <header class="panel-header">
        <div class="logo"><img src="./assets/logo-symbol.svg" alt="" class="logo-symbol"><span class="logo-text">ScopeMate</span></div>
      <button class="copy-btn" id="copyBtn" type="button" aria-label="결과 복사">
          <img src="./assets/copy_btn.svg" alt="" />
        </button><span class="copy-toast" id="copyToast">복사 완료</span>
      </header>

      <div class="panel-body">
        <section class="screen intro-screen is-active" id="introScreen">
          <div class="intro-inner">
            <h1 class="intro-title">
              몇 가지 질문에 답하면<br />
              예상 공수와 권장 일정을 계산해드립니다.
            </h1>

            <div class="badge time-badge">
              예상 소요 시간 30s
              <span class="clock-icon" aria-hidden="true"></span>
            </div>

            <button class="cta-btn" id="startBtn" type="button">
              <span class="gradient-text">시작하기</span>
            </button>
          </div>
        </section>

        <section class="screen question-screen" id="questionScreen">
          <div class="progress" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <div class="question-inner">
            <h2 class="question-title" id="questionTitle"></h2>
            <div class="option-list" id="optionList" role="radiogroup"></div>
          </div>

          <div class="direction-area">
            <button class="direction-btn" id="prevBtn" type="button" aria-label="이전" disabled>‹</button>
            <button class="direction-btn" id="nextBtn" type="button" aria-label="다음" disabled>›</button>
          </div>
        </section>

        <section class="screen loading-screen" id="loadingScreen">
          <div class="loading-inner">
            <div class="spinner" aria-hidden="true"></div>
            <p class="loading-text gradient-text" id="loadingText">예상 공수를 계산하고 있습니다.</p>
          </div>

          <div class="direction-area">
            <button class="direction-btn" type="button" aria-label="이전" disabled>‹</button>
            <button class="direction-btn" type="button" aria-label="다음" disabled>›</button>
          </div>
        </section>

        <section class="screen result-screen" id="resultScreen">
          <div class="result-inner">
            <div class="result-row">
              <p class="result-label">예상 공수</p>
              <strong class="result-number" id="resultHours">18-24시간</strong>
            </div>

            <div class="result-row">
              <p class="result-label">권장 일정</p>
              <strong class="result-number result-days" id="resultDays">3영업일</strong>
            </div>

            <div class="result-row">
              <p class="result-label">주요 영향 요소</p>
              <strong class="result-factors" id="resultFactors">단일페이지 / PC 기준 작업 / CMS 없음 / 개발 가이드 불필요</strong>
            </div>

            <p class="result-comment" id="resultComment">
              작업 범위가 비교적 명확한 편입니다.<br />
              큰 변동이 없다면 짧은 일정 안에서도 진행 가능해 보입니다.
            </p>
          </div>

          <div class="result-footer">
            <div class="direction-area result-direction">
              <button class="direction-btn" id="resultBackBtn" type="button" aria-label="이전">‹</button>
              <button class="direction-btn" type="button" aria-label="다음" disabled>›</button>
            </div>

            <button class="cta-btn restart-btn" id="restartBtn" type="button">
              <span class="gradient-text">다시 계산하기</span>
            </button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
